            </section>
        </main>

        <script>
            const button = document.getElementById("download-all");

            button.addEventListener("click", async () => {

                button.disabled = true;
                button.textContent = "Preparing ZIP...";

                const zip = new JSZip();
                const images = document.querySelectorAll(".poster-card img");

                for (const img of images) {
                    const response = await fetch(img.src);
                    const blob = await response.blob();

                    const filename = img.src.split("/").pop();

                    console.log(`Adding ${filename} to ZIP...`);

                    zip.file(filename, blob);
                }

                const content = await zip.generateAsync({ type: "blob" });

                saveAs(content, "posters.zip");

                button.disabled = false;
                button.textContent = "Download All Posters";
            });
        </script>
